<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="420" rx="32" fill="url(#bg)"/>
  <text x="700" y="72" text-anchor="middle" class="title" style="font-size:42px">The discovery infrastructure loop</text>
  <text x="700" y="112" text-anchor="middle" class="body">JAI Lab connects wet-lab chemistry, structured data, benchmark tasks, molecular AI, and experimental validation.</text>
  <g transform="translate(90 180)">
    <rect width="190" height="100" rx="20" fill="#0B2138" stroke="#22D3EE"/>
    <text x="95" y="44" text-anchor="middle" class="cardtitle">Experiments</text>
    <text x="95" y="70" text-anchor="middle" class="cardtext">real chemistry</text>
  </g>
  <path d="M295 230 H365" stroke="#38BDF8" stroke-width="3"/>
  <path d="M350 216 L372 230 L350 244" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <g transform="translate(380 180)">
    <rect width="190" height="100" rx="20" fill="#0B2138" stroke="#60A5FA"/>
    <text x="95" y="44" text-anchor="middle" class="cardtitle">Datasets</text>
    <text x="95" y="70" text-anchor="middle" class="cardtext">machine-readable</text>
  </g>
  <path d="M585 230 H655" stroke="#38BDF8" stroke-width="3"/>
  <path d="M640 216 L662 230 L640 244" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <g transform="translate(670 180)">
    <rect width="190" height="100" rx="20" fill="#0B2138" stroke="#A78BFA"/>
    <text x="95" y="44" text-anchor="middle" class="cardtitle">Benchmarks</text>
    <text x="95" y="70" text-anchor="middle" class="cardtext">measurable progress</text>
  </g>
  <path d="M875 230 H945" stroke="#38BDF8" stroke-width="3"/>
  <path d="M930 216 L952 230 L930 244" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <g transform="translate(960 180)">
    <rect width="190" height="100" rx="20" fill="#0B2138" stroke="#2DD4BF"/>
    <text x="95" y="44" text-anchor="middle" class="cardtitle">Models</text>
    <text x="95" y="70" text-anchor="middle" class="cardtext">predictive and generative</text>
  </g>
  <path d="M1165 230 H1235" stroke="#38BDF8" stroke-width="3"/>
  <path d="M1220 216 L1242 230 L1220 244" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <g transform="translate(1250 180)">
    <rect width="120" height="100" rx="20" fill="#0B2138" stroke="#34D399"/>
    <text x="60" y="44" text-anchor="middle" class="cardtitle" style="font-size:17px">Validation</text>
    <text x="60" y="70" text-anchor="middle" class="cardtext">lab feedback</text>
  </g>
  <path d="M1310 285 C1160 390 430 390 180 285" stroke="#2563EB" stroke-width="2" stroke-dasharray="8 8" fill="none"/>
  <text x="700" y="358" text-anchor="middle" class="mono">feedback converts predictions into better experiments</text>
</svg>
