<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050B18"/>
      <stop offset="0.55" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 42px Inter,Arial,sans-serif;fill:#ffffff;letter-spacing:.5px}
      .subtitle{font:500 18px Inter,Arial,sans-serif;fill:#B6C5D6}
      .nodeTitle{font:700 22px Inter,Arial,sans-serif;fill:#ffffff}
      .nodeText{font:500 14px Inter,Arial,sans-serif;fill:#B6C5D6}
      .line{stroke:#375A7F;stroke-width:3;stroke-linecap:round}
      .glow{stroke:url(#accent);stroke-width:3;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="100" r="150" fill="#00D4FF" opacity="0.08"/>
  <circle cx="150" cy="430" r="150" fill="#7C3AED" opacity="0.10"/>

  <text x="600" y="70" text-anchor="middle" class="title">JAI Lab</text>
  <text x="600" y="102" text-anchor="middle" class="subtitle">Open Infrastructure for Molecular Discovery</text>

  <line x1="600" y1="135" x2="600" y2="175" class="glow"/>
  <line x1="260" y1="175" x2="940" y2="175" class="line"/>
  <line x1="260" y1="175" x2="260" y2="215" class="line"/>
  <line x1="600" y1="175" x2="600" y2="215" class="glow"/>
  <line x1="940" y1="175" x2="940" y2="215" class="line"/>

  <g filter="url(#shadow)">
    <rect x="440" y="118" width="320" height="70" rx="22" fill="#0F2138" stroke="url(#accent)"/>
    <text x="600" y="151" text-anchor="middle" class="nodeTitle">Research Initiative</text>
    <text x="600" y="173" text-anchor="middle" class="nodeText">datasets · benchmarks · models · validation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="215" width="360" height="95" rx="22" fill="#0F2138" stroke="#244B6E"/>
    <text x="260" y="253" text-anchor="middle" class="nodeTitle">Infrastructure</text>
    <text x="260" y="278" text-anchor="middle" class="nodeText">SensorGenome · schemas · benchmarks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="215" width="360" height="95" rx="22" fill="#0F2138" stroke="url(#accent)"/>
    <text x="600" y="253" text-anchor="middle" class="nodeTitle">Molecular AI</text>
    <text x="600" y="278" text-anchor="middle" class="nodeText">DyeMind · models · active learning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="215" width="360" height="95" rx="22" fill="#0F2138" stroke="#244B6E"/>
    <text x="940" y="253" text-anchor="middle" class="nodeTitle">Translation</text>
    <text x="940" y="278" text-anchor="middle" class="nodeText">drug discovery · sensors · therapeutics</text>
  </g>

  <line x1="260" y1="310" x2="260" y2="355" class="line"/>
  <line x1="600" y1="310" x2="600" y2="355" class="glow"/>
  <line x1="940" y1="310" x2="940" y2="355" class="line"/>
  <line x1="150" y1="355" x2="1050" y2="355" class="line" opacity="0.8"/>

  <g filter="url(#shadow)">
    <rect x="70" y="378" width="210" height="72" rx="18" fill="#102A43" stroke="#375A7F"/>
    <text x="175" y="408" text-anchor="middle" class="nodeTitle">AZAI</text>
    <text x="175" y="431" text-anchor="middle" class="nodeText">xylazine analytics</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="310" y="378" width="240" height="72" rx="18" fill="#102A43" stroke="#375A7F"/>
    <text x="430" y="408" text-anchor="middle" class="nodeTitle">NarcoticSense AI</text>
    <text x="430" y="431" text-anchor="middle" class="nodeText">spectroscopy intelligence</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="580" y="378" width="180" height="72" rx="18" fill="#102A43" stroke="url(#accent)"/>
    <text x="670" y="408" text-anchor="middle" class="nodeTitle">BimaneDB</text>
    <text x="670" y="431" text-anchor="middle" class="nodeText">fluorophore data</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="790" y="378" width="160" height="72" rx="18" fill="#102A43" stroke="#375A7F"/>
    <text x="870" y="408" text-anchor="middle" class="nodeTitle">Pendrin</text>
    <text x="870" y="431" text-anchor="middle" class="nodeText">SLC26A4</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="980" y="378" width="150" height="72" rx="18" fill="#102A43" stroke="#375A7F"/>
    <text x="1055" y="408" text-anchor="middle" class="nodeTitle">CFTR</text>
    <text x="1055" y="431" text-anchor="middle" class="nodeText">QSAR suite</text>
  </g>
</svg>
