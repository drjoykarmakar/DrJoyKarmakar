<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <g opacity="0.28">
    <circle cx="1160" cy="120" r="240" fill="#0EA5E9"/>
    <circle cx="260" cy="440" r="230" fill="#8B5CF6"/>
  </g>
  <g opacity="0.35" stroke="#38BDF8" stroke-width="1">
    <path d="M110 120 C240 40 330 200 460 120 S710 40 840 120 S1070 205 1288 92"/>
    <path d="M78 430 C240 340 410 460 580 365 S850 265 1050 365 S1210 445 1320 330"/>
    <path d="M210 80 L310 158 L430 118 L520 210 L650 164 L770 245 L920 190 L1080 260 L1240 218"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="255" cy="150" r="8" fill="#67E8F9"/>
    <circle cx="390" cy="115" r="6" fill="#A78BFA"/>
    <circle cx="520" cy="210" r="7" fill="#22D3EE"/>
    <circle cx="770" cy="245" r="7" fill="#67E8F9"/>
    <circle cx="1080" cy="260" r="8" fill="#A78BFA"/>
    <circle cx="1240" cy="218" r="6" fill="#22D3EE"/>
  </g>
  <rect x="70" y="65" width="1260" height="390" rx="28" fill="#081629" fill-opacity="0.76" stroke="#164E63" stroke-opacity="0.82"/>
  <text x="700" y="156" text-anchor="middle" class="small">DR. JOY KARMAKAR / JAI LAB</text>
  <text x="700" y="229" text-anchor="middle" class="title">Open Infrastructure for Molecular Discovery</text>
  <text x="700" y="281" text-anchor="middle" class="subtitle">Datasets. Benchmarks. Scientific software. Molecular AI.</text>
  <text x="700" y="326" text-anchor="middle" class="body">Medicinal chemistry, fluorescent probes, transporter biology, spectroscopy, and open science</text>
  <g transform="translate(262,363)">
    <rect width="170" height="42" rx="21" fill="#0E7490" fill-opacity="0.28" stroke="#22D3EE" stroke-opacity="0.70"/>
    <text x="85" y="27" text-anchor="middle" class="chip">SensorGenome</text>
  </g>
  <g transform="translate(452,363)">
    <rect width="140" height="42" rx="21" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.70"/>
    <text x="70" y="27" text-anchor="middle" class="chip">DyeMind</text>
  </g>
  <g transform="translate(612,363)">
    <rect width="110" height="42" rx="21" fill="#0891B2" fill-opacity="0.22" stroke="#67E8F9" stroke-opacity="0.70"/>
    <text x="55" y="27" text-anchor="middle" class="chip">AZAI</text>
  </g>
  <g transform="translate(742,363)">
    <rect width="205" height="42" rx="21" fill="#2563EB" fill-opacity="0.20" stroke="#60A5FA" stroke-opacity="0.70"/>
    <text x="102" y="27" text-anchor="middle" class="chip">NarcoticSense AI</text>
  </g>
  <g transform="translate(967,363)">
