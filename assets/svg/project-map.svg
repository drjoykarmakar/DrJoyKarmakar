<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Map of JAI Research Projects">
  <title>JAI Research Projects map</title>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1400" y2="620" gradientUnits="userSpaceOnUse"><stop stop-color="#07111F"/><stop offset="1" stop-color="#0B1728"/></linearGradient><style>.title{font:800 32px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#F8FAFC}.subtitle{font:500 18px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#CBD5E1}.label{font:700 20px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#F8FAFC}.text{font:500 14px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#B8C7D9}</style></defs>
  <rect width="1400" height="620" rx="30" fill="url(#bg)"/>
  <text x="700" y="76" text-anchor="middle" class="title">JAI Research Projects</text>
  <text x="700" y="110" text-anchor="middle" class="subtitle">A public set of code, datasets, notes, and examples maintained by Joy Karmakar</text>
  <rect x="500" y="155" width="400" height="82" rx="22" fill="#0B2138" stroke="#22D3EE"/>
  <text x="700" y="190" text-anchor="middle" class="label">Research question</text>
  <text x="700" y="217" text-anchor="middle" class="text">How can chemical data be easier to reuse?</text>
  <path d="M700 237 V286" stroke="#38BDF8" stroke-width="2"/><path d="M160 286 H1240" stroke="#38BDF8" stroke-width="2"/><path d="M160 286 V330 M340 286 V330 M520 286 V330 M700 286 V330 M880 286 V330 M1060 286 V330 M1240 286 V330" stroke="#38BDF8" stroke-width="2"/>
  <g transform="translate(40 330)"><rect width="240" height="120" rx="20" fill="#0B2138" stroke="#22D3EE"/><text x="120" y="38" text-anchor="middle" class="label">SensorGenome</text><text x="120" y="69" text-anchor="middle" class="text">molecular sensing</text><text x="120" y="92" text-anchor="middle" class="text">schemas and examples</text></g>
  <g transform="translate(220 475)"><rect width="240" height="100" rx="20" fill="#121A38" stroke="#A78BFA"/><text x="120" y="37" text-anchor="middle" class="label">DyeMind</text><text x="120" y="68" text-anchor="middle" class="text">fluorescent probe design</text></g>
  <g transform="translate(400 330)"><rect width="240" height="120" rx="20" fill="#0B2138" stroke="#60A5FA"/><text x="120" y="38" text-anchor="middle" class="label">BimaneDB</text><text x="120" y="69" text-anchor="middle" class="text">bimane dyes</text><text x="120" y="92" text-anchor="middle" class="text">and descriptors</text></g>
  <g transform="translate(580 475)"><rect width="240" height="100" rx="20" fill="#0B2138" stroke="#2DD4BF"/><text x="120" y="37" text-anchor="middle" class="label">QSAR work</text><text x="120" y="68" text-anchor="middle" class="text">pendrin and CFTR</text></g>
  <g transform="translate(760 330)"><rect width="240" height="120" rx="20" fill="#0B2138" stroke="#67E8F9"/><text x="120" y="38" text-anchor="middle" class="label">NarcoticSense-AI</text><text x="120" y="69" text-anchor="middle" class="text">spectroscopy and</text><text x="120" y="92" text-anchor="middle" class="text">chemometrics</text></g>
  <g transform="translate(940 475)"><rect width="240" height="100" rx="20" fill="#0B2138" stroke="#34D399"/><text x="120" y="37" text-anchor="middle" class="label">AZAI</text><text x="120" y="68" text-anchor="middle" class="text">xylazine data analysis</text></g>
  <g transform="translate(1120 330)"><rect width="240" height="120" rx="20" fill="#0B2138" stroke="#818CF8"/><text x="120" y="38" text-anchor="middle" class="label">Paper tools</text><text x="120" y="69" text-anchor="middle" class="text">literature organization</text><text x="120" y="92" text-anchor="middle" class="text">and notes</text></g>
</svg>
