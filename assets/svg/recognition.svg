<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Selected honors and programs">
  <title>Selected honors and programs</title>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse"><stop stop-color="#07111F"/><stop offset="1" stop-color="#0B1728"/></linearGradient><style>.title{font:800 32px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#F8FAFC}.sub{font:500 18px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#CBD5E1}.year{font:800 22px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#67E8F9}.item{font:700 18px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#F8FAFC}.text{font:500 14px Inter,ui-sans-serif,system-ui,Segoe UI,Arial;fill:#B8C7D9}</style></defs>
  <rect width="1400" height="520" rx="30" fill="url(#bg)"/>
  <text x="700" y="68" text-anchor="middle" class="title">Selected honors, programs, and service</text>
  <text x="700" y="101" text-anchor="middle" class="sub">Listed by name and year</text>
  <g transform="translate(82 145)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#22D3EE"/><text x="30" y="42" class="year">2024</text><text x="30" y="74" class="item">UCSF PBBR Award</text><text x="30" y="101" class="text">Postdoctoral Independent Research Award</text></g>
  <g transform="translate(510 145)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#A78BFA"/><text x="30" y="42" class="year">2026</text><text x="30" y="74" class="item">HBS Foundry Bootcamp</text><text x="30" y="101" class="text">June Cohort</text></g>
  <g transform="translate(938 145)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#60A5FA"/><text x="30" y="42" class="year">2025</text><text x="30" y="74" class="item">ACS Postdoc to Faculty</text><text x="30" y="101" class="text">Workshop, Washington, DC</text></g>
  <g transform="translate(82 305)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#2DD4BF"/><text x="30" y="42" class="year">2026</text><text x="30" y="74" class="item">Sigma Xi</text><text x="30" y="101" class="text">Full Member</text></g>
  <g transform="translate(510 305)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#34D399"/><text x="30" y="42" class="year">2022</text><text x="30" y="74" class="item">Doctoral research award</text><text x="30" y="101" class="text">Ari’el University</text></g>
  <g transform="translate(938 305)"><rect width="380" height="126" rx="20" fill="#0B2138" stroke="#818CF8"/><text x="30" y="42" class="year">2022</text><text x="30" y="74" class="item">NCCR Bioinspired</text><text x="30" y="101" class="text">Special Sponsor Award</text></g>
</svg>
