<svg width="1400" height="460" viewBox="0 0 1400 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="460" rx="32" fill="url(#bg)"/>
  <text x="700" y="70" text-anchor="middle" class="title" style="font-size:42px">Research trajectory</text>
  <text x="700" y="108" text-anchor="middle" class="body">A path from synthetic chemistry to molecular AI and open scientific infrastructure.</text>
  <path d="M135 250 H1265" stroke="#38BDF8" stroke-width="4"/>
  <g transform="translate(110 190)"><circle cx="25" cy="60" r="22" fill="#22D3EE"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2013</text><text x="25" y="148" text-anchor="middle" class="cardtext">B.Sc.</text></g>
  <g transform="translate(300 190)"><circle cx="25" cy="60" r="22" fill="#60A5FA"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2016</text><text x="25" y="148" text-anchor="middle" class="cardtext">M.Sc.</text></g>
  <g transform="translate(490 190)"><circle cx="25" cy="60" r="22" fill="#A78BFA"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2022</text><text x="25" y="148" text-anchor="middle" class="cardtext">Ph.D.</text></g>
  <g transform="translate(680 190)"><circle cx="25" cy="60" r="22" fill="#34D399"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2023</text><text x="25" y="148" text-anchor="middle" class="cardtext">UCSF</text></g>
  <g transform="translate(870 190)"><circle cx="25" cy="60" r="22" fill="#67E8F9"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2024</text><text x="25" y="148" text-anchor="middle" class="cardtext">PBBR</text></g>
  <g transform="translate(1060 190)"><circle cx="25" cy="60" r="22" fill="#818CF8"/><text x="25" y="120" text-anchor="middle" class="cardtitle">2026</text><text x="25" y="148" text-anchor="middle" class="cardtext">JAI Lab</text></g>
  <text x="700" y="390" text-anchor="middle" class="mono">synthetic chemistry -> fluorescent probes -> ion transporters -> molecular AI -> open infrastructure</text>
</svg>
