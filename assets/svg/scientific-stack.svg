<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="560" rx="32" fill="url(#bg)"/>
  <text x="700" y="68" text-anchor="middle" class="title" style="font-size:42px">Scientific stack</text>
  <text x="700" y="106" text-anchor="middle" class="body">Experimental chemistry + molecular modeling + machine learning + open documentation.</text>
  <g transform="translate(90 165)">
    <rect width="280" height="280" rx="26" fill="#0B2138" stroke="#22D3EE"/>
    <text x="140" y="48" text-anchor="middle" class="cardtitle">Chemistry</text>
    <text x="140" y="92" text-anchor="middle" class="cardtext">Synthesis</text>
    <text x="140" y="122" text-anchor="middle" class="cardtext">SAR and lead optimization</text>
    <text x="140" y="152" text-anchor="middle" class="cardtext">Fluorescent probes</text>
    <text x="140" y="182" text-anchor="middle" class="cardtext">HPLC, LC-MS, NMR</text>
    <text x="140" y="212" text-anchor="middle" class="cardtext">Spectroscopy</text>
  </g>
  <g transform="translate(405 165)">
    <rect width="280" height="280" rx="26" fill="#0B2138" stroke="#60A5FA"/>
    <text x="140" y="48" text-anchor="middle" class="cardtitle">Molecular modeling</text>
    <text x="140" y="92" text-anchor="middle" class="cardtext">RDKit</text>
    <text x="140" y="122" text-anchor="middle" class="cardtext">AutoDock and Vina</text>
    <text x="140" y="152" text-anchor="middle" class="cardtext">Maestro</text>
    <text x="140" y="182" text-anchor="middle" class="cardtext">SwissADME, ADMETlab</text>
    <text x="140" y="212" text-anchor="middle" class="cardtext">ORCA and Avogadro</text>
  </g>
  <g transform="translate(720 165)">
    <rect width="280" height="280" rx="26" fill="#0B2138" stroke="#A78BFA"/>
    <text x="140" y="48" text-anchor="middle" class="cardtitle">AI and data</text>
    <text x="140" y="92" text-anchor="middle" class="cardtext">Python</text>
    <text x="140" y="122" text-anchor="middle" class="cardtext">PyTorch, TensorFlow</text>
    <text x="140" y="152" text-anchor="middle" class="cardtext">QSAR and descriptors</text>
    <text x="140" y="182" text-anchor="middle" class="cardtext">Active learning</text>
    <text x="140" y="212" text-anchor="middle" class="cardtext">LLMs for chemistry</text>
  </g>
  <g transform="translate(1035 165)">
    <rect width="280" height="280" rx="26" fill="#0B2138" stroke="#34D399"/>
    <text x="140" y="48" text-anchor="middle" class="cardtitle">Open science</text>
    <text x="140" y="92" text-anchor="middle" class="cardtext">Dataset cards</text>
    <text x="140" y="122" text-anchor="middle" class="cardtext">Benchmark cards</text>
    <text x="140" y="152" text-anchor="middle" class="cardtext">Reproducible notebooks</text>
    <text x="140" y="182" text-anchor="middle" class="cardtext">GitHub Actions</text>
    <text x="140" y="212" text-anchor="middle" class="cardtext">Documentation systems</text>
  </g>
</svg>
