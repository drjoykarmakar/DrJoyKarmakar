<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="760" rx="32" fill="url(#bg)"/>
  <g opacity="0.32">
    <circle cx="1040" cy="210" r="230" fill="#0EA5E9"/>
    <circle cx="340" cy="590" r="240" fill="#7C3AED"/>
  </g>
  <rect x="505" y="70" width="390" height="116" rx="24" fill="#0B2138" stroke="#22D3EE" stroke-width="2"/>
  <text x="700" y="116" text-anchor="middle" class="cardtitle">JAI Lab</text>
  <text x="700" y="148" text-anchor="middle" class="cardtext">Open molecular discovery infrastructure</text>
  <path d="M700 186 V248" stroke="#38BDF8" stroke-width="2"/>
  <rect x="424" y="248" width="552" height="88" rx="22" fill="#0A1A30" stroke="#2563EB"/>
  <text x="700" y="284" text-anchor="middle" class="cardtitle">Research Operating System</text>
  <text x="700" y="310" text-anchor="middle" class="cardtext">Experiments -> datasets -> benchmarks -> models -> software -> validation</text>
  <path d="M700 336 V386" stroke="#38BDF8" stroke-width="2"/>
  <path d="M225 386 H1175" stroke="#38BDF8" stroke-width="2"/>
  <path d="M225 386 V430 M415 386 V430 M605 386 V430 M795 386 V430 M985 386 V430 M1175 386 V430" stroke="#38BDF8" stroke-width="2"/>
  <g transform="translate(80 430)">
    <rect width="290" height="125" rx="20" fill="#0B2138" stroke="#22D3EE"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">SensorGenome</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">Molecular sensing data</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">schemas and benchmarks</text>
  </g>
  <g transform="translate(224 585)">
    <rect width="290" height="110" rx="20" fill="#121A38" stroke="#A78BFA"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">DyeMind</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">AI for fluorescent probe</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">and fluorophore design</text>
  </g>
  <g transform="translate(415 430)">
    <rect width="290" height="125" rx="20" fill="#0B2138" stroke="#60A5FA"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">NarcoticSense AI</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">Spectroscopy, chemometrics</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">and molecular detection</text>
  </g>
  <g transform="translate(560 585)">
    <rect width="290" height="110" rx="20" fill="#0B2138" stroke="#2DD4BF"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">BimaneDB</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">Curated bimane fluorophore</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">database and QSAR ideas</text>
  </g>
  <g transform="translate(750 430)">
    <rect width="290" height="125" rx="20" fill="#0B2138" stroke="#67E8F9"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">AZAI</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">AI-driven xylazine</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">analytics and sensing</text>
  </g>
  <g transform="translate(895 585)">
    <rect width="290" height="110" rx="20" fill="#0B2138" stroke="#34D399"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">Discovery Suite</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">QSAR, docking, SAR</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">for transporter biology</text>
  </g>
  <g transform="translate(1085 430)">
    <rect width="290" height="125" rx="20" fill="#0B2138" stroke="#818CF8"/>
    <text x="145" y="38" text-anchor="middle" class="cardtitle">Open Science Tools</text>
    <text x="145" y="68" text-anchor="middle" class="cardtext">Documentation, templates</text>
    <text x="145" y="92" text-anchor="middle" class="cardtext">and research workflows</text>
  </g>
</svg>
