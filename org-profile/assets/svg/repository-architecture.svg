<svg width="1400" height="640" viewBox="0 0 1400 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JAI Lab graphic">
  <title>JAI Lab</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6EE7F9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 64px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; letter-spacing: -1.5px; }
      .subtitle { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #BDEFFF; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #CBD5E1; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #94A3B8; letter-spacing: .8px; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #E0F2FE; }
      .cardtitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #F8FAFC; }
      .cardtext { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; fill: #B8C7D9; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #67E8F9; }
    </style>
  </defs>
  <rect width="1400" height="640" rx="32" fill="url(#bg)"/>
  <text x="700" y="70" text-anchor="middle" class="title" style="font-size:42px">Repository architecture</text>
  <text x="700" y="108" text-anchor="middle" class="body">A clean public map for visitors, collaborators, hiring committees, and open-source contributors.</text>
  <g transform="translate(75 160)">
    <rect width="390" height="380" rx="28" fill="#0B2138" stroke="#22D3EE"/>
    <text x="195" y="45" text-anchor="middle" class="cardtitle">Flagship research</text>
    <text x="42" y="95" class="cardtext">SensorGenome</text>
    <text x="42" y="130" class="cardtext">DyeMind</text>
    <text x="42" y="165" class="cardtext">NarcoticSense-AI</text>
    <text x="42" y="200" class="cardtext">AZAI</text>
    <text x="42" y="250" class="mono">Goal: scientific products, not random repos</text>
  </g>
  <g transform="translate(505 160)">
    <rect width="390" height="380" rx="28" fill="#0B2138" stroke="#A78BFA"/>
    <text x="195" y="45" text-anchor="middle" class="cardtitle">Molecular discovery</text>
    <text x="42" y="95" class="cardtext">pendrin-qsar</text>
    <text x="42" y="130" class="cardtext">pendrin-hybrid</text>
    <text x="42" y="165" class="cardtext">cftr-qsar</text>
    <text x="42" y="200" class="cardtext">BimaneDB</text>
    <text x="42" y="250" class="mono">Goal: reusable notebooks and benchmarks</text>
  </g>
  <g transform="translate(935 160)">
    <rect width="390" height="380" rx="28" fill="#0B2138" stroke="#34D399"/>
    <text x="195" y="45" text-anchor="middle" class="cardtitle">Infrastructure</text>
    <text x="42" y="95" class="cardtext">Paper-Organizer</text>
    <text x="42" y="130" class="cardtext">drjoykarmakar.github.io</text>
    <text x="42" y="165" class="cardtext">templates</text>
    <text x="42" y="200" class="cardtext">docs</text>
    <text x="42" y="250" class="mono">Goal: make research easier to reuse</text>
  </g>
</svg>
